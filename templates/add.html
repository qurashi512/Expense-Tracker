{% extends "layout.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-body p-5">

                <h2 class="mb-4">➕ Add New Expense</h2>

                <form action="/add" method="POST">

                    <div class="form-group">
                        <label>Amount ($) *</label>
                        <input type="number" name="amount" step="0.01" min="0.01"
                               class="form-control" placeholder="e.g. 25.50" required>
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category" class="form-control" required>
                            <option value="" disabled selected>Select a category</option>
                            <option>🍕 Food</option>
                            <option>🚗 Transport</option>
                            <option>🏠 Housing</option>
                            <option>💊 Health</option>
                            <option>🎮 Entertainment</option>
                            <option>👕 Shopping</option>
                            <option>📚 Education</option>
                            <option>💡 Bills</option>
                            <option>✈️ Travel</option>
                            <option>🔧 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" name="date"
                               class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Note <small class="text-muted">(optional)</small></label>
                        <input type="text" name="note"
                               class="form-control" placeholder="e.g. Lunch with friends">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-3">
                        ➕ Add Expense
                    </button>

                    <a href="/" class="btn btn-outline-secondary btn-block mt-2">
                        Cancel
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
