{% extends "layout.html" %}

{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-body p-5">

                <h2 class="mb-4">✏️ Edit Expense</h2>

                <form action="/edit/{{ expense.id }}" method="POST">

                    <div class="form-group">
                        <label>Amount ($) *</label>
                        <input type="number" name="amount" step="0.01" min="0.01"
                               class="form-control"
                               value="{{ expense.amount }}" required>
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category" class="form-control" required>
                            <option value="" disabled>Select a category</option>
                            {% for cat in [
                                "🍕 Food", "🚗 Transport", "🏠 Housing",
                                "💊 Health", "🎮 Entertainment", "👕 Shopping",
                                "📚 Education", "💡 Bills", "✈️ Travel", "🔧 Other"
                            ] %}
                            <option {% if expense.category == cat %}selected{% endif %}>
                                {{ cat }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" name="date"
                               class="form-control"
                               value="{{ expense.date }}" required>
                    </div>

                    <div class="form-group">
                        <label>Note <small class="text-muted">(optional)</small></label>
                        <input type="text" name="note"
                               class="form-control"
                               value="{{ expense.note or '' }}"
                               placeholder="e.g. Lunch with friends">
                    </div>

                    <button type="submit" class="btn btn-warning btn-block mt-3">
                        ✏️ Save Changes
                    </button>

                    <a href="/history" class="btn btn-outline-secondary btn-block mt-2">
                        Cancel
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
